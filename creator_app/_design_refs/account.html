<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator App - Wallet & Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', -apple-system, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; background-color: #E5E7EB; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .mobile-frame { width: 390px; height: 844px; background: #FAFAFA; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); border: 8px solid #111827; display: flex; flex-direction: column; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .premium-shadow { box-shadow: 0 4px 24px -6px rgba(0, 0, 0, 0.04), 0 0 1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="mobile-frame hide-scroll">

    <div class="h-12 w-full flex justify-between items-center px-6 pt-2 bg-[#FAFAFA]">
        <span class="text-[15px] font-semibold text-black tracking-tight">21:15</span>
        <div class="flex space-x-1"><div class="w-4 h-4 bg-black rounded-full"></div></div>
    </div>

    <div class="px-6 pt-5 pb-2 flex justify-between items-center">
        <h1 class="text-[28px] font-semibold text-[#111827] tracking-tight">Account</h1>
        <div class="w-10 h-10 bg-white rounded-full flex justify-center items-center premium-shadow cursor-pointer">
            <svg class="w-5 h-5 text-[#111827]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </div>
    </div>

    <div class="flex-1 px-5 pt-3 pb-28 overflow-y-auto">
        
        <div class="bg-white rounded-[28px] p-6 premium-shadow mb-6 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#F3E8FF] rounded-full blur-3xl opacity-60 pointer-events-none"></div>

            <p class="text-[12px] font-semibold text-[#6B7280] uppercase tracking-widest mb-2 relative z-10">Available to withdraw</p>
            
            <h2 class="text-[52px] font-semibold text-[#111827] tracking-tighter leading-none mb-6 relative z-10">
                <span class="text-[32px] text-[#9CA3AF] align-top mr-1">$</span>1,250
            </h2>

            <button class="w-full bg-[#111827] text-white font-medium py-[16px] rounded-[18px] text-[16px] hover:bg-black transition-colors flex justify-center items-center space-x-2 relative z-10 mb-5 shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                <span>Cash Out</span>
            </button>

            <div class="flex justify-between items-center px-2 relative z-10">
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 bg-[#F3F4F6] rounded flex justify-center items-center">
                        <svg class="w-3.5 h-3.5 text-[#111827]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg> </div>
                    <span class="text-[12px] text-[#6B7280] font-medium">Chase ****4092</span>
                </div>
                <div class="text-right">
                    <span class="text-[12px] text-[#6B7280] font-medium block">Pending (30 days)</span>
                    <span class="text-[13px] font-semibold text-[#111827]">$500.00</span>
                </div>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="text-[15px] font-semibold text-[#111827]">Recent Activity</h3>
                <span class="text-[12px] font-medium text-[#9CA3AF] cursor-pointer hover:text-[#111827]">View all</span>
            </div>

            <div class="bg-white rounded-[24px] p-3 premium-shadow">
                
                <div class="flex items-center justify-between p-3 border-b border-[#F3F4F6]">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-[#F9FAFB] rounded-[10px] overflow-hidden shrink-0 border border-[#F3F4F6]">
                            <img src="https://images.unsplash.com/photo-1616683693504-3ea7e9ad6fec?q=80&w=100&auto=format&fit=crop" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="text-[13px] font-semibold text-[#111827] truncate w-[160px]">CBD Luxury Basket</p>
                            <p class="text-[11px] text-[#9CA3AF] mt-0.5">Today • TikTok</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[14px] font-semibold text-[#111827]">+$500</p>
                        <p class="text-[10px] text-[#D97706] bg-[#FEF3C7] px-1.5 py-0.5 rounded mt-1 inline-block font-bold uppercase">Pending</p>
                    </div>
                </div>

                <div class="flex items-center justify-between p-3 border-b border-[#F3F4F6]">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-[#F9FAFB] rounded-[10px] overflow-hidden shrink-0 border border-[#F3F4F6]">
                            <img src="https://images.unsplash.com/photo-1544457070-4cd773b4d71e?q=80&w=100&auto=format&fit=crop" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="text-[13px] font-semibold text-[#111827] truncate w-[160px]">Whitsunday Boho</p>
                            <p class="text-[11px] text-[#9CA3AF] mt-0.5">Oct 12 • IG Reels</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[14px] font-semibold text-[#111827]">+$250</p>
                        <p class="text-[10px] text-[#059669] bg-[#ECFDF5] px-1.5 py-0.5 rounded mt-1 inline-block font-bold uppercase">Paid</p>
                    </div>
                </div>
                
                <div class="flex items-center justify-between p-3">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-[#F3F4F6] rounded-[10px] flex justify-center items-center shrink-0">
                            <svg class="w-5 h-5 text-[#6B7280]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        </div>
                        <div>
                            <p class="text-[13px] font-semibold text-[#111827]">Withdraw to Chase</p>
                            <p class="text-[11px] text-[#9CA3AF] mt-0.5">Oct 01</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[14px] font-semibold text-[#111827]">- $800</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <div class="absolute bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-[#F3F4F6] flex justify-around items-start pt-3 pb-8 z-20">
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-[#9CA3AF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] text-[#9CA3AF] font-normal">Matches</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-[#9CA3AF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[10px] text-[#9CA3AF] font-normal">Approvals</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-[#9CA3AF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span class="text-[10px] text-[#9CA3AF] font-normal">Work</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-[#111827]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span class="text-[10px] text-[#111827] font-semibold">Account</span>
        </div>
    </div>

</div>

</body>
</html>
