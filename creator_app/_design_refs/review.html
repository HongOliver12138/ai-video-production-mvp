<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator App - Draft Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟手机屏幕和系统字体 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #e5e7eb; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .mobile-frame { 
            width: 390px; height: 844px; /* iPhone 14 Pro 尺寸 */
            background: #ffffff; 
            border-radius: 40px; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            border: 8px solid #1f2937; 
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="mobile-frame flex flex-col hide-scroll">
    
    <div class="h-12 w-full flex justify-between items-center px-6 pt-2">
        <span class="text-sm font-semibold">16:45</span>
        <div class="flex space-x-1"><div class="w-4 h-4 bg-black rounded-full"></div></div>
    </div>

    <div class="flex-1 px-6 pt-6 pb-24 overflow-y-auto">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">Ready for review</h1>
        <p class="text-gray-500 text-sm mb-6">AI prepared this draft based on your materials.</p>

        <div class="w-full aspect-[9/16] bg-gray-100 rounded-3xl relative mb-8 flex items-center justify-center overflow-hidden border border-gray-200">
            <div class="w-14 h-14 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center shadow-sm cursor-pointer hover:scale-105 transition-transform">
                <svg class="w-6 h-6 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-md rounded-xl p-3 flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-tr from-purple-400 to-pink-500 rounded-full"></div>
                <div>
                    <p class="text-xs font-bold text-black">15s TikTok Clip</p>
                    <p class="text-[10px] text-gray-500">CBD Luxury Basket</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col space-y-4">
            <button class="w-full bg-black text-white font-semibold py-4 rounded-2xl text-lg hover:bg-gray-800 transition-colors shadow-md">
                Approve & Submit
            </button>
            
            <button class="w-full text-gray-400 font-medium py-2 text-sm hover:text-gray-700 transition-colors">
                Needs tweaks
            </button>
        </div>
    </div>

    <div class="absolute bottom-0 w-full h-24 bg-white border-t border-gray-100 flex justify-around items-start pt-4 px-2">
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] text-gray-400 font-medium">Home</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <div class="relative">
                <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></div>
            </div>
            <span class="text-[10px] text-black font-semibold">Approvals</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span class="text-[10px] text-gray-400 font-medium">Work</span>
        </div>
        <div class="flex flex-col items-center space-y-1 cursor-pointer">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span class="text-[10px] text-gray-400 font-medium">Me</span>
        </div>
    </div>

</div>

</body>
</html>
